<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Saniya's CI/CD Task</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e1b4b, #312e81, #0f172a);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: #fff;
      position: relative;
    }

    .card {
      width: 90%;
      max-width: 700px;
      text-align: center;
      padding: 45px 30px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
      animation: fadeIn 1.2s ease;
      z-index: 2;
    }

    h1 {
      font-size: 2.7rem;
      margin-bottom: 15px;
      color: #f8fafc;
    }

    h2 {
      font-size: 1.2rem;
      font-weight: 400;
      color: #cbd5e1;
      margin-bottom: 20px;
    }

    p {
      font-size: 1rem;
      color: #e2e8f0;
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .badge {
      display: inline-block;
      margin-top: 18px;
      padding: 10px 18px;
      border-radius: 999px;
      background: #22c55e;
      color: #08130b;
      font-weight: 700;
      font-size: 0.95rem;
      animation: glow 2s infinite ease-in-out;
    }

    .name {
      color: #facc15;
      font-weight: 700;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(10px);
      opacity: 0.35;
      animation: float 8s infinite ease-in-out;
    }

    .blob1 {
      width: 180px;
      height: 180px;
      background: #38bdf8;
      top: 8%;
      left: 10%;
    }

    .blob2 {
      width: 220px;
      height: 220px;
      background: #a855f7;
      bottom: 10%;
      right: 10%;
      animation-duration: 10s;
    }

    .blob3 {
      width: 120px;
      height: 120px;
      background: #f43f5e;
      bottom: 20%;
      left: 18%;
      animation-duration: 7s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(25px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-25px);
      }
    }

    @keyframes glow {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 10px rgba(34, 197, 94, 0.4);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 0 18px rgba(34, 197, 94, 0.7);
      }
    }
  </style>
</head>
<body>

  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>

  <div class="card">
    <h1>CI/CD Pipeline Demo</h1>
    <h2>GitHub Actions + GitHub Pages</h2>

    <p>Hello, I’m <span class="name">Saniya Mary Jacob</span>.</p>
    <p>This website was deployed as part of my CI/CD assignment using GitHub Actions.</p>
    <p>The pipeline automatically publishes this site to GitHub Pages whenever changes are pushed.</p>

    <div class="badge">Build Successful</div>
  </div>

</body>
</html>
